<!DOCTYPE html>
<html>

<head>

<title>لعبتي العالمية</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body {

margin:0;
background:black;
color:white;
text-align:center;

}

#map {

height:80vh;

}

</style>

</head>

<body>

<h2>🌍 خريطة اللعبة</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([30,31],3);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'

).addTo(map);

</script>

</body>

</html>
