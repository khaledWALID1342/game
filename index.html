<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
WORLD ROCKETS — Command Center
</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">


<style>


/* ===========================
GLOBAL STYLE
=========================== */

body{

margin:0;

font-family:'Cairo';

background:

radial-gradient(circle at top,

#020617,

#000);

color:white;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}


/* ===========================
BACKGROUND EFFECT
=========================== */

body::before{

content:"";

position:absolute;

width:200%;

height:200%;

background:

linear-gradient(

45deg,

transparent,

#00f0ff22,

transparent

);

animation:scan 8s linear infinite;

}


@keyframes scan{

0%{

transform:translateY(-100%);

}

100%{

transform:translateY(100%);

}

}


/* ===========================
MAIN PANEL
=========================== */

.panel{

position:relative;

width:420px;

padding:40px;

border-radius:20px;

background:

rgba(15,23,42,.85);

backdrop-filter:blur(20px);

box-shadow:

0 0 40px #00f0ff44,

inset 0 0 20px #00f0ff22;

animation:fadeIn 1.5s;

}


@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}


/* ===========================
LOGO
=========================== */

.logo{

font-size:32px;

font-weight:900;

text-align:center;

margin-bottom:10px;

background:

linear-gradient(

90deg,

#00f0ff,

#00ffa6

);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}


/* ===========================
SUBTITLE
=========================== */

.subtitle{

text-align:center;

color:#aaa;

margin-bottom:30px;

}


/* ===========================
INPUT
=========================== */

input,select{

width:100%;

padding:15px;

margin-top:10px;

border-radius:10px;

border:none;

background:#020617;

color:white;

font-size:16px;

outline:none;

box-shadow:

inset 0 0 10px #00f0ff22;

}


input:focus{

box-shadow:

0 0 15px #00f0ff;

}


/* ===========================
BUTTON
=========================== */

button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:

linear-gradient(

90deg,

#00f0ff,

#00ffa6

);

color:black;

transition:.3s;

}


button:hover{

transform:scale(1.05);

box-shadow:

0 0 20px #00f0ff;

}


/* ===========================
STATUS
=========================== */

.status{

text-align:center;

margin-top:20px;

color:#00ffa6;

font-size:14px;

}


/* ===========================
FOOTER
=========================== */

.footer{

position:absolute;

bottom:10px;

width:100%;

text-align:center;

font-size:12px;

color:#555;

}


</style>

</head>



<body>



<div class="panel">


<div class="logo">

WORLD ROCKETS

</div>


<div class="subtitle">

القيادة العسكرية العالمية

</div>



<select id="server">

<option value="server_1">

🌍 الشرق الأوسط

</option>

<option value="server_2">

🇪🇺 أوروبا

</option>

<option value="server_3">

🇺🇸 أمريكا

</option>

</select>



<input

id="name"

placeholder="اسم القائد"

>



<input

id="password"

type="password"

placeholder="كلمة المرور"

>



<button onclick="register()">

إنشاء حساب جديد

</button>



<button onclick="login()">

تسجيل الدخول

</button>



<div class="status" id="status">

Secure Military Connection Ready

</div>


</div>



<div class="footer">

World Rockets Command © 2026

</div>



<script type="module" src="auth.js"></script>



</body>

</html>
