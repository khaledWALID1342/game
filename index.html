<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="World Rockets Game - لعبة حروب الصواريخ الاستراتيجية المباشرة">
    <meta name="theme-color" content="#0d1117">
    
    <title>World Rockets Game | النسخة العالمية 🚀</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-screen" class="active">
        <div class="loader-content">
            <i class="fa-solid fa-rocket fa-bounce fa-3x" style="color: #ff4757;"></i>
            <h2>جاري الاتصال بالسيرفر العالمي...</h2>
            <div class="progress-bar"><div id="loading-progress"></div></div>
        </div>
    </div>

    <header id="game-header">
        <div class="logo">
            <i class="fa-solid fa-earth-americas"></i> World Rockets
        </div>
        
        <div class="player-stats-container">
            <div class="stat-badge health" title="مستوى الصحة">
                <i class="fa-solid fa-heart"></i> <span id="hud-health">100%</span>
            </div>
            <div class="stat-badge shield" title="الدروع النشطة">
                <i class="fa-solid fa-shield-halved"></i> <span id="hud-shield">0</span>
            </div>
            <div class="stat-badge coins" title="العملات">
                <i class="fa-solid fa-coins"></i> <span id="hud-coins">0</span>
            </div>
            <div class="stat-badge rockets" title="الصواريخ المتاحة">
                <i class="fa-solid fa-rocket"></i> <span id="hud-rockets">0</span>
            </div>
        </div>

        <div class="top-actions">
            <button id="btn-auth" class="btn-glow"><i class="fa-solid fa-right-to-bracket"></i> دخول/تسجيل</button>
            <button id="btn-settings" class="btn-icon"><i class="fa-solid fa-gear"></i></button>
        </div>
    </header>

    <main id="game-container">
        
        <div id="map"></div>

        <div id="kill-feed" class="notifications-area">
            </div>

        <div class="floating-controls">
            <button id="btn-locate" class="btn-float btn-primary" title="تحديد قاعدتي">
                <i class="fa-solid fa-location-crosshairs"></i>
            </button>
            <button id="btn-collect-coins" class="btn-float btn-success" title="تجميع موارد">
                <i class="fa-solid fa-sack-dollar"></i>
            </button>
            <button id="btn-shop" class="btn-float btn-warning" title="السوق الأسود">
                <i class="fa-solid fa-cart-shopping"></i>
            </button>
        </div>
    </main>

    <aside id="leaderboard-panel" class="panel-glass">
        <h3 class="panel-title"><i class="fa-solid fa-trophy"></i> تصنيف القادة</h3>
        <div id="leaderboard-list" class="scrollable-list">
            <div class="loading-text">جاري جلب البيانات...</div>
        </div>
    </aside>

    <div id="audio-manager" style="display: none;">
        <audio id="sfx-launch" src="assets/launch.mp3" preload="auto"></audio>
        <audio id="sfx-explosion" src="assets/explosion.mp3" preload="auto"></audio>
        <audio id="sfx-coin" src="assets/coin.mp3" preload="auto"></audio>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>

    <script type="module" src="game.js"></script>

</body>
</html>
