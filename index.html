<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Rockets Game</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#0b0f1a;
color:white;
font-family:Arial;
}

#topbar{
background:black;
padding:10px;
display:flex;
justify-content:space-between;
}

button{
background:red;
color:white;
border:none;
padding:10px;
margin:3px;
}

#map{
height:60vh;
}

#panel{
background:#111;
padding:10px;
}

#leaderboard{
background:#000;
padding:10px;
height:150px;
overflow:auto;
}

</style>

</head>
<body>

<div id="topbar">

<div>
🌍 World Rockets Game
</div>

<div>

<button onclick="login()">👤 دخول</button>

<button onclick="addPlayer()">📍 موقعي</button>

<button onclick="launchRocket()">🚀 صاروخ</button>

<button onclick="earnCoins()">💰 Coins</button>

</div>

</div>

<div id="map"></div>

<div id="panel">

👤 Name:
<span id="name">-</span>

|

⭐ Score:
<span id="score">0</span>

|

🚀 Rockets:
<span id="rockets">0</span>

|

💰 Coins:
<span id="coins">0</span>

</div>

<div id="leaderboard">

🏆 Leaderboard

<div id="list"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

//////////////////////////////////////////////////////
// DATABASE
//////////////////////////////////////////////////////

var DB = {

players:[],

current:null

};

//////////////////////////////////////////////////////
// SAVE
//////////////////////////////////////////////////////

function save(){

localStorage.setItem(

"game",

JSON.stringify(DB)

);

}

//////////////////////////////////////////////////////
// LOAD
//////////////////////////////////////////////////////

function load(){

var data = localStorage.getItem("game");

if(data){

DB = JSON.parse(data);

}

}

//////////////////////////////////////////////////////
// LOGIN
//////////////////////////////////////////////////////

function login(){

var name = prompt("اسمك");

if(!name)return;

var player = DB.players.find(

p=>p.name==name

);

if(player){

DB.current = player;

}else{

player = {

id:Date.now(),

name:name,

lat:0,

lng:0,

score:100,

coins:50,

rockets:3

};

DB.players.push(player);

DB.current=player;

}

save();

updateUI();

draw();

}

//////////////////////////////////////////////////////
// MAP
//////////////////////////////////////////////////////

var map = L.map(

'map',

{

zoomControl:false,

touchZoom:true,

scrollWheelZoom:false

}

).setView([20,0],2);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'

).addTo(map);

//////////////////////////////////////////////////////
// DRAW PLAYERS
//////////////////////////////////////////////////////

function draw(){

map.eachLayer(function(layer){

if(layer instanceof L.Marker)

map.removeLayer(layer);

});

DB.players.forEach(function(p){

if(!p.lat)return;

var marker = L.marker([p.lat,p.lng])

.addTo(map)

.bindPopup(

"👤 "+p.name+

"<br>⭐ "+p.score+

"<br>🚀 "+p.rockets

);

marker.on("click",function(){

target=p;

});

});

updateLeaderboard();

}

//////////////////////////////////////////////////////
// ADD LOCATION
//////////////////////////////////////////////////////

function addPlayer(){

if(!DB.current){

alert("سجل دخول");

return;

}

alert("اضغط على موقعك");

map.once("click",function(e){

DB.current.lat=e.latlng.lat;

DB.current.lng=e.latlng.lng;

save();

draw();

});

}

//////////////////////////////////////////////////////
// COINS
//////////////////////////////////////////////////////

function earnCoins(){

if(!DB.current)return;

DB.current.coins+=10;

save();

updateUI();

}

//////////////////////////////////////////////////////
// ROCKET
//////////////////////////////////////////////////////

var target=null;

function launchRocket(){

if(!target){

alert("اختر لاعب");

return;

}

if(DB.current.rockets<=0){

alert("لا يوجد صواريخ");

return;

}

DB.current.rockets--;

target.score-=20;

DB.current.score+=20;

save();

draw();

updateUI();

}

//////////////////////////////////////////////////////
// LEADERBOARD
//////////////////////////////////////////////////////

function updateLeaderboard(){

var list = document.getElementById("list");

list.innerHTML="";

DB.players

.sort((a,b)=>b.score-a.score)

.forEach(function(p){

list.innerHTML+=

"<div>"

+p.name+

" ⭐ "+p.score+

"</div>";

});

}

//////////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////////

function updateUI(){

if(!DB.current)return;

document.getElementById("name")

.innerText=DB.current.name;

document.getElementById("score")

.innerText=DB.current.score;

document.getElementById("coins")

.innerText=DB.current.coins;

document.getElementById("rockets")

.innerText=DB.current.rockets;

}

//////////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////////

load();

draw();

updateUI();

//////////////////////////////////////////////////////

</script>

</body>

</html>
