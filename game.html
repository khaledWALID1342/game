<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

WORLD ROCKETS — Battle Command

</title>


<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">


<!-- Leaflet -->

<link rel="stylesheet"

href="https://unpkg.com/leaflet/dist/leaflet.css"/>



<style>


/* ===============================
GLOBAL
=============================== */

body{

margin:0;

font-family:Cairo;

background:black;

overflow:hidden;

color:white;

}


/* ===============================
MAP FULLSCREEN
=============================== */

#map{

position:absolute;

width:100%;

height:100%;

z-index:1;

}


/* ===============================
TOP HUD
=============================== */

#hud{

position:absolute;

top:0;

width:100%;

padding:10px;

display:flex;

justify-content:space-between;

background:

linear-gradient(

180deg,

rgba(0,0,0,.9),

transparent

);

z-index:999;

}


/* logo */

#logo{

font-size:22px;

font-weight:900;

color:#00f0ff;

}


/* stats */

.stat{

margin-left:15px;

display:inline-block;

font-weight:bold;

}


.health{

color:#00ff9c;

}


.coins{

color:gold;

}


.rockets{

color:#ff3b3b;

}


/* ===============================
LEFT PANEL
=============================== */

#leftPanel{

position:absolute;

left:10px;

top:100px;

z-index:999;

display:flex;

flex-direction:column;

gap:10px;

}


.btn{

width:55px;

height:55px;

border-radius:50%;

border:none;

font-size:22px;

cursor:pointer;

background:

linear-gradient(

45deg,

#00f0ff,

#0066ff

);

color:white;

}


.btn:hover{

transform:scale(1.1);

}


/* ===============================
RIGHT PANEL
=============================== */

#rightPanel{

position:absolute;

right:10px;

top:100px;

width:260px;

background:

rgba(0,0,0,.7);

padding:10px;

border-radius:10px;

z-index:999;

}


/* leaderboard */

.player{

padding:5px;

border-bottom:1px solid #333;

}


/* ===============================
BOTTOM PANEL
=============================== */

#bottom{

position:absolute;

bottom:0;

width:100%;

padding:10px;

background:

linear-gradient(

0deg,

rgba(0,0,0,.9),

transparent

);

z-index:999;

}


/* killfeed */

#killfeed{

color:red;

font-size:14px;

}


/* ===============================
INBOX
=============================== */

#inbox{

position:absolute;

right:20px;

bottom:80px;

width:300px;

height:300px;

background:black;

border:1px solid #00f0ff;

display:none;

z-index:1000;

overflow:auto;

}


.message{

padding:5px;

border-bottom:1px solid #333;

}


/* ===============================
CLAN PANEL
=============================== */

#clanPanel{

position:absolute;

left:20px;

bottom:80px;

width:300px;

height:300px;

background:black;

border:1px solid #00ff9c;

display:none;

z-index:1000;

}


/* ===============================
NOTIFICATION
=============================== */

#notify{

position:absolute;

top:70px;

left:50%;

transform:translateX(-50%);

background:#00f0ff;

color:black;

padding:10px;

display:none;

z-index:1000;

}


</style>

</head>

<body>



<!-- MAP -->

<div id="map"></div>



<!-- HUD -->

<div id="hud">


<div id="logo">

🌍 WORLD ROCKETS

</div>



<div>

<span class="stat health">

❤️ <span id="health">100</span>

</span>


<span class="stat coins">

🪙 <span id="coins">0</span>

</span>


<span class="stat rockets">

🚀 <span id="rockets">0</span>

</span>

</div>


</div>




<!-- LEFT BUTTONS -->

<div id="leftPanel">


<button class="btn"

onclick="locateBase()">

📍

</button>


<button class="btn"

onclick="openInbox()">

✉️

</button>


<button class="btn"

onclick="openClan()">

🤝

</button>


<button class="btn"

onclick="openShop()">

🛒

</button>


</div>




<!-- RIGHT PANEL -->

<div id="rightPanel">


<h3>

🏆 التصنيف

</h3>


<div id="leaderboard">

Loading...

</div>


</div>




<!-- BOTTOM -->

<div id="bottom">


<div id="killfeed">

Connected...

</div>


</div>




<!-- INBOX -->

<div id="inbox">

<h3>

📥 الرسائل

</h3>

<div id="messages"></div>

</div>




<!-- CLAN -->

<div id="clanPanel">

<h3>

🤝 التحالف

</h3>

<div id="clanList">

لا يوجد

</div>

</div>




<!-- NOTIFY -->

<div id="notify"></div>




<!-- LEAFLET -->

<script src=

"https://unpkg.com/leaflet/dist/leaflet.js">

</script>




<!-- GAME ENGINE -->

<script type="module"

src="game.js">

</script>




<!-- UI SCRIPT -->

<script>


function openInbox(){

let el=document.getElementById("inbox");

el.style.display=

el.style.display=="block"

?"none":"block";

}


function openClan(){

let el=document.getElementById("clanPanel");

el.style.display=

el.style.display=="block"

?"none":"block";

}


function notify(text){

let n=document.getElementById("notify");

n.innerText=text;

n.style.display="block";

setTimeout(

()=>n.style.display="none"

,3000);

}


</script>




</body>

</html>
