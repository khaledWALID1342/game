<!DOCTYPE html><html><head><title>Dashboard</title></head><body><h2>Attack Logs</h2><div id="logs"></div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {

apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "world-rockets"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


const querySnapshot =
await getDocs(collection(db, "logs"));


querySnapshot.forEach(doc => {

document.getElementById("logs").innerHTML +=

"<hr>" +

"Text: " + doc.data().text +

"<br>Severity: " + doc.data().severity +

"<br>Time: " + doc.data().time;

});


</script></body>
</html>
